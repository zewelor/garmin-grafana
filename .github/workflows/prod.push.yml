name: Build and Push Multi-Architecture Docker Image (Latest Build)

on:
  push:
    branches:
      - main
    paths:
      - 'src/garmin_grafana/garmin_fetch.py'
      - 'src/garmin_grafana/influxdb_exporter.py'
      - 'src/garmin_grafana/garmin_bulk_importer.py'
      - 'src/garmin_grafana/__init__.py'
      - 'compose-example.yml'
      - 'pyproject.toml'
      - 'Dockerfile'
      - '.python-version'
      - 'uv.lock'

env:
  IMAGE_NAME: garmin-grafana

jobs:
  build_and_push:
    name: Build Multi-Arch Docker Image and Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU for Multi-Architecture Support
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Multi-Arch Image (linux/amd64, linux/arm64) and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
