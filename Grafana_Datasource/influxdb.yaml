apiVersion: 1
prune: true
deleteDatasources:
  - name: Garmin-InfluxDB
    orgId: 1
datasources:
  - name: Garmin-QuestDB
    uid: garmin_stats
    type: postgres
    access: proxy
    url: influxdb:8812
    user: admin
    isDefault: true
    editable: true
    secureJsonData:
      password: quest
    jsonData:
      database: qdb
      sslmode: disable
      postgresVersion: 1500
      timescaledb: false
